name: Android CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      JAVA_TOOL_OPTIONS: -Xmx2g

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 33
          build-tools: 33.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Gradle
        run: |
          curl -sSLO https://services.gradle.org/distributions/gradle-7.5.1-bin.zip
          unzip -q gradle-7.5.1-bin.zip -d gradle
          echo "GRADLE_HOME=$(pwd)/gradle/gradle-7.5.1" >> $GITHUB_ENV
          echo "PATH=$(pwd)/gradle/gradle-7.5.1/bin:$PATH" >> $GITHUB_ENV

      - name: Install JS dependencies
        run: npm install --legacy-peer-deps

      - name: Build Android APK
        working-directory: android
        run: |
          set -e
          # prefer project wrapper if available, otherwise use installed gradle
          if [ -f ./gradlew ]; then
            chmod +x ./gradlew || true
            ./gradlew assembleRelease --no-daemon
          else
            gradle assembleRelease --no-daemon
          fi

      - name: Upload APKs
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apks
          path: android/app/build/outputs/apk/**/release/*.apk
